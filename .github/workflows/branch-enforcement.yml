name: Branch Enforcement

permissions:
  contents: read

on:
  pull_request:
    branches:
      - master
      - dev

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Source Branch
        run: |
          TARGET_BRANCH="${{ github.base_ref }}"
          SOURCE_BRANCH="${{ github.head_ref }}"
          
          echo "Target Branch: $TARGET_BRANCH"
          echo "Source Branch: $SOURCE_BRANCH"
          
          if [[ "$TARGET_BRANCH" == "master" ]]; then
            if [[ "$SOURCE_BRANCH" != "dev" ]]; then
              echo "ERROR: Only the 'dev' branch can be merged into 'master'."
              exit 1
            fi
          elif [[ "$TARGET_BRANCH" == "dev" ]]; then
            if [[ ! "$SOURCE_BRANCH" =~ ^(feat|feature|fix|testing|chore|docs|perf|refactor|style|ci)/ ]]; then
              echo "ERROR: Development on 'dev' must come from feat/*, feature/*, fix/*, testing/*, chore/*, docs/*, perf/*, refactor/*, style/*, or ci/* branches via PR."
              exit 1
            fi
          fi
          echo "SUCCESS: Branch source is valid."
